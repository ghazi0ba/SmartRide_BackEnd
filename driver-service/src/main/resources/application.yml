spring:
  application:
    name: driver-service
  
  datasource:
    url: jdbc:h2:mem:smartride_driver
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  
  h2:
    console:
      enabled: true
      path: /h2-console
  
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true
  
  cloud:
    config:
      import-check:
        enabled: false
      fail-fast: false

server:
  port: 8085
  servlet:
    context-path: /

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true
    hostname: localhost

logging:
  level:
    root: INFO
    esprit.driver: DEBUG
    org.springframework.cloud.openfeign: DEBUG
