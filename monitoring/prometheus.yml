# Prometheus scrape configuration for SmartRide microservices.
# Targets use the docker-compose service names (internal network).
# trajet-service and reservation-service serve actuator under a context-path.
global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'eureka'
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['eureka:8761']

  - job_name: 'configserver'
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['configserver:8888']

  - job_name: 'gateway'
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['gateway:9001']

  - job_name: 'user-service'
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['user-service:8081']

  - job_name: 'trajet-service'
    metrics_path: /smartride_trajet/actuator/prometheus
    static_configs:
      - targets: ['trajet-service:8082']

  - job_name: 'payment-service'
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['payment-service:8083']

  - job_name: 'reservation-service'
    metrics_path: /smartride_reservation/actuator/prometheus
    static_configs:
      - targets: ['reservation-service:8084']

  - job_name: 'driver-service'
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['driver-service:8085']
