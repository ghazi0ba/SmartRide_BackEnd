spring.application.name=ApiGateway
server.port=9001

# Eureka client
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.client.service-url.defaultZone=http://localhost:8761/eureka

# Logging
logging.level.org.springframework.cloud.gateway=DEBUG
logging.level.reactor.netty.http.client=DEBUG

# ======================= GATEWAY ROUTES =======================

# user-service
spring.cloud.gateway.routes[0].id=user-service
spring.cloud.gateway.routes[0].uri=lb://smartride-user-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/users/**

# trajet-service
spring.cloud.gateway.routes[1].id=trajet-service
spring.cloud.gateway.routes[1].uri=lb://trajet-s
spring.cloud.gateway.routes[1].predicates[0]=Path=/smartride_trajet/api/trajets/**

# reservation-service
spring.cloud.gateway.routes[2].id=reservation-service
spring.cloud.gateway.routes[2].uri=lb://smartride-reservation-service
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/reservations/**

# driver-service
spring.cloud.gateway.routes[3].id=driver-service
spring.cloud.gateway.routes[3].uri=lb://driver-service
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/drivers/**

# payment-service
spring.cloud.gateway.routes[4].id=payment-service
spring.cloud.gateway.routes[4].uri=lb://PAYMENT-SERVICE
spring.cloud.gateway.routes[4].predicates[0]=Path=/payments/**

# ======================= SECURITY (Keycloak / OAuth2 Resource Server) =======================
# Le Gateway valide les JWT émis par Keycloak (realm 'smartride').
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8080/realms/smartride
# jwk-set-uri est dérivé automatiquement de l'issuer, mais on peut le forcer :
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://localhost:8080/realms/smartride/protocol/openid-connect/certs

# ======================= SWAGGER CENTRALISÉ =======================
# Routes vers les /v3/api-docs de chaque microservice (réécriture du chemin)
spring.cloud.gateway.routes[5].id=user-service-docs
spring.cloud.gateway.routes[5].uri=lb://smartride-user-service
spring.cloud.gateway.routes[5].predicates[0]=Path=/user-service/v3/api-docs
spring.cloud.gateway.routes[5].filters[0]=RewritePath=/user-service/v3/api-docs, /v3/api-docs

spring.cloud.gateway.routes[6].id=trajet-service-docs
spring.cloud.gateway.routes[6].uri=lb://trajet-s
spring.cloud.gateway.routes[6].predicates[0]=Path=/trajet-service/v3/api-docs
spring.cloud.gateway.routes[6].filters[0]=RewritePath=/trajet-service/v3/api-docs, /v3/api-docs

spring.cloud.gateway.routes[7].id=reservation-service-docs
spring.cloud.gateway.routes[7].uri=lb://smartride-reservation-service
spring.cloud.gateway.routes[7].predicates[0]=Path=/reservation-service/v3/api-docs
spring.cloud.gateway.routes[7].filters[0]=RewritePath=/reservation-service/v3/api-docs, /v3/api-docs

spring.cloud.gateway.routes[8].id=driver-service-docs
spring.cloud.gateway.routes[8].uri=lb://driver-service
spring.cloud.gateway.routes[8].predicates[0]=Path=/driver-service/v3/api-docs
spring.cloud.gateway.routes[8].filters[0]=RewritePath=/driver-service/v3/api-docs, /v3/api-docs

spring.cloud.gateway.routes[9].id=payment-service-docs
spring.cloud.gateway.routes[9].uri=lb://PAYMENT-SERVICE
spring.cloud.gateway.routes[9].predicates[0]=Path=/payment-service/v3/api-docs
spring.cloud.gateway.routes[9].filters[0]=RewritePath=/payment-service/v3/api-docs, /v3/api-docs

# Swagger UI agrégée (un seul point d'accès : http://localhost:9001/swagger-ui.html)
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.enabled=false
springdoc.swagger-ui.urls[0].name=user-service
springdoc.swagger-ui.urls[0].url=/user-service/v3/api-docs
springdoc.swagger-ui.urls[1].name=trajet-service
springdoc.swagger-ui.urls[1].url=/trajet-service/v3/api-docs
springdoc.swagger-ui.urls[2].name=reservation-service
springdoc.swagger-ui.urls[2].url=/reservation-service/v3/api-docs
springdoc.swagger-ui.urls[3].name=driver-service
springdoc.swagger-ui.urls[3].url=/driver-service/v3/api-docs
springdoc.swagger-ui.urls[4].name=payment-service
springdoc.swagger-ui.urls[4].url=/payment-service/v3/api-docs
