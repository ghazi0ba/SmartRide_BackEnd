spring.application.name=ApiGateway
server.port=9001

# Eureka client
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.client.service-url.defaultZone=http://localhost:8761/eureka

# Logging
logging.level.org.springframework.cloud.gateway=DEBUG
logging.level.reactor.netty.http.client=DEBUG

# ======================= GATEWAY ROUTES =======================

# user-service
spring.cloud.gateway.routes[0].id=user-service
spring.cloud.gateway.routes[0].uri=lb://smartride-user-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/users/**

# trajet-service
spring.cloud.gateway.routes[1].id=trajet-service
spring.cloud.gateway.routes[1].uri=lb://trajet-s
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/trajets/**

# reservation-service
spring.cloud.gateway.routes[2].id=reservation-service
spring.cloud.gateway.routes[2].uri=lb://smartride-reservation-service
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/reservations/**

# driver-service
spring.cloud.gateway.routes[3].id=driver-service
spring.cloud.gateway.routes[3].uri=lb://driver-service
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/drivers/**

# payment-service
spring.cloud.gateway.routes[4].id=payment-service
spring.cloud.gateway.routes[4].uri=lb://PAYMENT-SERVICE
spring.cloud.gateway.routes[4].predicates[0]=Path=/payments/**

# ======================= SECURITY (Keycloak / OAuth2 Resource Server) =======================
# Le Gateway valide les JWT émis par Keycloak (realm 'smartride').
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8080/realms/smartride
# jwk-set-uri est dérivé automatiquement de l'issuer, mais on peut le forcer :
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://localhost:8080/realms/smartride/protocol/openid-connect/certs
