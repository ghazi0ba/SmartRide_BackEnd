spring.application.name=trajet-s
server.port=8082
server.servlet.context-path=/smartride_trajet

#eureka registration
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.client.register-with-eureka=true

### DATABASE ###
spring.datasource.url=jdbc:mysql://localhost:3306/smartride_trajet?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=Gamers281001Acss

### JPA / HIBERNATE ###
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update


spring.cloud.config.enabled=true
spring.config.import=optional:configserver:http://localhost:8888


welcome.message=Hello from the Trajet Service!

# ======================= RabbitMQ =======================
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

# ======================= Actuator / Prometheus =======================
# Actuator est servi sous le context-path: /smartride_trajet/actuator/prometheus
management.endpoints.web.exposure.include=health,info,prometheus
management.metrics.tags.application=${spring.application.name}
