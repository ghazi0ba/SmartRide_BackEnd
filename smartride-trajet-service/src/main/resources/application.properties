spring.application.name=TRAJET-SERVICE
server.port=8082

#eureka registration
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.client.register-with-eureka=true

### DATABASE ###
spring.datasource.url=jdbc:mysql://localhost:3306/smartride_trajet?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=

### JPA / HIBERNATE ###
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update

spring.config.import=optional:configserver:http://localhost:8888


eureka.client.fetch-registry=true

server.servlet.context-path=/smartride_trajet