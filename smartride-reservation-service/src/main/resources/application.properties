spring.application.name=smartride-reservation-service
server.port=8084

# MongoDB — URI comes from env (docker sets mongodb://mongo:27017/smartride); falls back to local for dev
spring.data.mongodb.uri=${SPRING_DATA_MONGODB_URI:mongodb://localhost:27017/smartride}
spring.data.mongodb.auto-index-creation=true

# Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

# Logging
logging.level.com.example.smartridereservationservice=DEBUG
logging.level.org.springframework.web=INFO

# Server context path
server.servlet.context-path=/smartride_reservation

# Config Server
spring.cloud.config.enabled=true
spring.config.import=optional:configserver:http://localhost:8888

# ======================= RabbitMQ =======================
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest
